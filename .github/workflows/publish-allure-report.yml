name: Publish Allure Report

on:
  workflow_run:
    workflows: ["Quality Gate"]
    types: [completed]

permissions:
  contents: read
  actions: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  publish:
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download API Allure results
        uses: actions/download-artifact@v8
        with:
          name: allure-results
          path: allure-results
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download live HTTP Allure results
        uses: actions/download-artifact@v8
        with:
          name: allure-e2e-results
          path: allure-e2e-results
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          package-manager-cache: false

      - name: Generate static Allure report
        run: >-
          npx --yes allure-commandline@2.43.0 generate
          allure-results
          allure-e2e-results
          --clean
          --output allure-report

      - name: Verify generated report
        run: test -s allure-report/index.html

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: allure-report

      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
