name: Quality Gate

on:
  push:
  pull_request:

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -e ".[dev]"

      - name: Lint backend
        run: python -m ruff check .

      - name: Run API tests with coverage gate
        run: >
          python -m pytest tests/api
          --cov=app
          --cov-report=term-missing
          --cov-report=xml:coverage.xml
          --cov-fail-under=80
          --alluredir=allure-results

      - name: Generate Allure metadata
        if: always()
        run: python scripts/write_allure_metadata.py

      - name: Generate frontend quality snapshot
        run: python scripts/build_quality_snapshot.py

      - name: Run test-suite quality checks
        run: python -m pytest tests/meta

      - name: Build production container
        run: docker build --tag order-quality-gate:ci .

      - name: Run live HTTP API tests against production container
        shell: bash
        run: |
          rm -rf allure-e2e-results
          CONTAINER_ID=$(docker run --detach --rm \
            --publish 8001:8001 \
            --env JWT_SECRET_KEY=ci-only-secret-key-at-least-32-bytes \
            --env DATABASE_URL=sqlite:////tmp/order-quality-gate-ci.db \
            order-quality-gate:ci)

          cleanup() {
            docker logs "$CONTAINER_ID" > api-e2e-backend.log 2>&1 || true
            docker stop "$CONTAINER_ID" > /dev/null 2>&1 || true
          }
          trap cleanup EXIT

          for attempt in {1..30}; do
            if curl --noproxy '*' --fail --silent http://127.0.0.1:8001/api/health > /dev/null; then
              break
            fi
            sleep 1
          done

          curl --noproxy '*' --fail --silent http://127.0.0.1:8001/api/health > /dev/null
          curl --noproxy '*' --fail --silent http://127.0.0.1:8001/ > /dev/null
          API_BASE_URL=http://127.0.0.1:8001 \
          API_TRUST_ENV=false \
          python -m pytest tests/e2e -m e2e --alluredir=allure-e2e-results

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Install Playwright browser
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Run Playwright UI smoke test
        shell: bash
        run: |
          python -m uvicorn app.main:app --host 127.0.0.1 --port 8001 > backend.log 2>&1 &
          BACKEND_PID=$!
          npm --prefix frontend run dev > frontend.log 2>&1 &
          FRONTEND_PID=$!
          trap 'kill $BACKEND_PID $FRONTEND_PID 2>/dev/null || true' EXIT

          for attempt in {1..30}; do
            if curl --fail --silent http://127.0.0.1:8001/api/health > /dev/null && \
               curl --fail --silent http://127.0.0.1:5173 > /dev/null; then
              break
            fi
            sleep 1
          done

          curl --fail --silent http://127.0.0.1:8001/api/health > /dev/null
          curl --fail --silent http://127.0.0.1:5173 > /dev/null
          npm --prefix frontend run ui:smoke

      - name: Upload frontend build artifact
        uses: actions/upload-artifact@v6
        with:
          name: frontend-dist
          path: frontend/dist
          if-no-files-found: warn

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: allure-results
          path: allure-results
          if-no-files-found: warn

      - name: Upload live API Allure results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: allure-e2e-results
          path: allure-e2e-results
          if-no-files-found: warn

      - name: Upload coverage XML
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: warn

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: playwright-report
          path: frontend/playwright-report
          if-no-files-found: warn

      - name: Upload UI service logs
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: ui-service-logs
          path: |
            backend.log
            frontend.log
            api-e2e-backend.log
          if-no-files-found: warn
